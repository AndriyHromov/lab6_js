<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Lights Out</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            gap: 5px;
            justify-content: center;
            margin-top: 20px;
        }

        .cell {
            width: 60px;
            height: 60px;
            cursor: pointer;
        }

        .on {
            background-color: yellow;
        }

        .off {
            background-color: black;
        }
    </style>
</head>
<body>

<h2>Lights Out</h2>

<button onclick="loadRandom()">Нове поле</button>
<button onclick="resetLevel()">Скинути поле</button>

<p>Ходи: <span id="moves">0</span></p>
<p id="status"></p>

<div id="grid"></div>

<script src="script.js"></script>

</body>
</html>
